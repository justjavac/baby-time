<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>gift for justjavac's baby</title>
    <script type="text/javascript">
        if (window.top !== window.self) { top.location = self.location; }
    </script>
    <meta name="description" content="justjavac">
    <meta name="keywords" content="justjavac">
    <meta name="author" content="justjavac">
    <meta name="theme-color" content="#1e2327">
    <style>
        body {
            -webkit-font-smoothing: antialiased;
            font-family: Helvetica Neue, Helvetica, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif;
            background-image: url('https://wx2.sinaimg.cn/large/5127613dly1fin2sqd6gfj219s0wddhz.jpg');
            font-size: 85%;
            margin: 0;
        }

        h1 {
            font-size: 300%;
            font-weight: 400;
        }

        .content {
            position: absolute;
            width: 100%;
            top: 40%;
            transform: translate(0, -50%);
            text-align: center;
        }

        .timer {
            font-size: 180%;
            line-height: 1.5;
            margin: 1em 0;
        }

        .timer b {
            color: red;
        }

        .browsehappy {
            color: #fff;
            font-size: 18px;
            text-align: center;
            position: relative;
            top: 49%
        }
        .v-fork-me {position:fixed;right:0;top:0;z-index:999;}
        @media (max-width: 979px) {
            .v-fork-me {display: none;}
        }
    </style>
</head>

<body>
    <div class="content">
        <h1>justjavac's babies</h1>
        <h1>距离高考还有</h1>
        <div id="timers"></div>
    </div>

    <a class="v-fork-me" href="https://github.com/justjavac/baby-time" target="_blank" rel="noopener">
      <img src="https://justjavac.com/assets/themes/twitter/bootstrap/img/forkme_right_darkblue.png" alt="Fork me on GitHub">
    </a>

    <script>
        var children = [
            {
                endTime: new Date('2035-06-07T09:00:00+08:00')
            },
            {
                endTime: new Date('2039-06-07T09:00:00+08:00')
            }
        ];

        function renderTimers() {
            var timers = document.getElementById('timers');

            for (var i = 0; i < children.length; i++) {
                var child = children[i];
                var id = 'child-' + i;
                var timerElement = document.createElement('div');

                child.id = id;

                timerElement.className = 'timer';
                timerElement.innerHTML = '<b id="' + id + '-d"></b> 天 <b id="' + id + '-h"></b> 时 <b id="' + id + '-m"></b> 分 <b id="' + id + '-s"></b> 秒';
                timers.appendChild(timerElement);
            }
        }

        function getTimeLeft(endTime, now) {
            var t = Math.max(0, endTime - now);

            return {
                days: Math.floor(t / 1000 / 60 / 60 / 24),
                hours: Math.floor(t / 1000 / 60 / 60) % 24,
                minutes: Math.floor(t / 1000 / 60) % 60,
                seconds: Math.floor(t / 1000) % 60
            };
        }

        function updateTimer(child, now) {
            var timeLeft = getTimeLeft(child.endTime, now);

            document.getElementById(child.id + '-d').innerHTML = timeLeft.days;
            document.getElementById(child.id + '-h').innerHTML = timeLeft.hours;
            document.getElementById(child.id + '-m').innerHTML = timeLeft.minutes;
            document.getElementById(child.id + '-s').innerHTML = timeLeft.seconds;
        }

        function timer() {
            var now = new Date();
            for (var i = 0; i < children.length; i++) {
                updateTimer(children[i], now);
            }

            setTimeout(timer, 1000);
        }

        renderTimers();
        timer();
    </script>
</body>

</html>
